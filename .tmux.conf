# use backtick as tmux prefix
unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix

# remap copy-mode to prefix + v
unbind [
bind v copy-mode

setw -g mode-keys vi
# Use v to begin selection (like Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Use y to yank (copy) to the macOS clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

set-option -g history-limit 5000
set-option -g mouse on

# start window number from 1 and reorder automatically
set -g base-index 1
set -g renumber-windows on

# split panes using | and -
bind '\' split-window -h
bind - split-window -v

# reload config file
bind r source-file ~/.tmux.conf \; display -d 1000 " ✔ Config Reloaded"

# switch panes using Alt-h,j,k,l without prefix
unbind Left
unbind Right
unbind Up
unbind Down
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# use shift + arrow keys to resize panes
bind -n S-Up resize-pane -U 2
bind -n S-Down resize-pane -D 2
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2

# DESIGN TWEAKS
set-option -g default-terminal "screen-256color"
set-option -sa terminal-features ',xterm-256color:RGB'

# 1. Base Status Bar Appearance
# Dark background (nord1) with light text (nord4)
set -g status-style "bg=#3B4252,fg=#D8DEE9"

# 2. Window Tabs (Left side of status bar)
# Inactive window: subtle text
setw -g window-status-style "bg=#3B4252,fg=#D8DEE9"
setw -g window-status-format " #I:#W "

# Active window: highlighted with Nord's frosty blue (nord8), dark text (nord0)
setw -g window-status-current-style "bg=#88C0D0,fg=#2E3440,bold"
setw -g window-status-current-format " #I:#W "

# 3. Pane Borders
# Active pane: muted grey (nord3)
set -g pane-active-border-style "fg=#4C5660"
# Inactive pane: frosty blue (nord8)
set -g pane-border-style "fg=#88C0D0"

# 4. Command Prompt / Message Line
# When you press prefix + :
set -g message-style "bg=#434C5E,fg=#88C0D0,bold"

# 5. Left and Right Status Elements
# Left: Session name in dark blue (nord9)
set -g status-left "#[bg=#81A1C1,fg=#2E3440,bold] #S #[bg=default,fg=default] "
set -g status-left-length 40

# Right: Date and Time
set -g status-right "#[bg=#434C5E,fg=#D8DEE9] %Y-%m-%d %H:%M #[bg=#88C0D0,fg=#2E3440,bold] #H "
set -g status-right-length 150

